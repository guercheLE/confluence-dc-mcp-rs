language: rust
output: .
force: true
publish_registry: true
publication:
  license: MIT
  repository: https://github.com/guercheLE/confluence-dc-mcp-rs
  readme: README.md
  authors: ["Luciano Evaristo Guerche (Gorše)"]
  keywords: [mcp, confluence, cli, api]
  categories: [command-line-utilities, api-bindings]
  exclude: [/.github, /.mcpify, /docs, /scripts, /openapi, /Dockerfile, /docker-compose.yml, /.dockerignore, /.env.example, /mcpify.yaml]
auth:
  - name: personalAccessToken
    kind: pat
versions:
  - version: 10.2.14
    source: https://dac-static.atlassian.com/server/confluence/10.2.14.swagger.v3.json
    default: true
  - version: 10.1.2
    source: https://dac-static.atlassian.com/server/confluence/10.1.2.swagger.v3.json
  - version: 10.0.3
    source: https://dac-static.atlassian.com/server/confluence/10.0.3.swagger.v3.json
  - version: 9.5.4
    source: https://dac-static.atlassian.com/server/confluence/9.5.4.swagger.v3.json
  - version: 9.4.1
    source: https://dac-static.atlassian.com/server/confluence/9.4.1.swagger.v3.json
  - version: 9.3.2
    source: https://dac-static.atlassian.com/server/confluence/9.3.2.swagger.v3.json
  - version: 9.2.21
    source: https://dac-static.atlassian.com/server/confluence/9.2.21.swagger.v3.json
version_policy:
  mode: all
package_size_limit_mb: 100
